<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #1e293b; padding: 2rem; border-radius: 12px; max-width: 420px; text-align: center; }
    h1 { color: #f87171; margin-top: 0; }
    code { background: #334155; padding: 0.2rem 0.5rem; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Access blocked</h1>
    <p>Your IP address <code>{{ ip_address }}</code> has been blocked from this site.</p>
    <p style="color:#94a3b8;font-size:0.875rem">Contact the site administrator if you believe this is an error.</p>
  </div>
</body>
</html>
